name: CI

on:
    push:
        branches:
            - main

jobs:
    build-backend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Build backend Docker image
              run: docker build -t my-site-backend ./backend

    build-frontend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Build frontend Docker image
              run: docker build -t my-site-frontend ./frontend
